name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: minnekart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: >-
        postgresql://postgres:password@localhost:5432/minnekart_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  # main migrates production, dev migrates the Neon `dev` branch. Both secrets
  # hold Neon's direct (unpooled) host — DDL wants a session connection.
  migrate:
    name: Migrate Neon
    runs-on: ubuntu-latest
    needs: checks
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    env:
      DATABASE_URL: >-
        ${{ github.ref == 'refs/heads/main'
        && secrets.DATABASE_URL || secrets.DATABASE_URL_DEV }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx drizzle-kit migrate
